<!DOCTYPE html>
<html lang="zh-CN"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XM方案表-LT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            padding: 6px;
            background-color: #f5f7fa;
            font-size: 10px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        /* 顶部：标题居中，按钮左上 */
        .header-bar {
            position: relative;
            text-align: center;
            margin-bottom: 6px;
            min-height: 24px;
        }

        h1 {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            line-height: 24px;
        }

        .add-column-btn {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 3px 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 500;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .add-column-btn:hover {
            transform: translateY(-50%) scale(1.03);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .table-wrapper {
            overflow-x: auto;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
        }

        /* 原表头隐藏，首行按钮行已包含「筛选/参数/编辑/删除」 */
        #dataTable thead { display: none; }

        th, td {
            border: 1px solid #d9d9d9;
            padding: 1px 2px;
            text-align: center;
            position: relative;
            word-break: break-all;
            vertical-align: middle;
        }

        /* 最左筛选列（列宽进一步缩小） */
        .col-filter {
            min-width: 4px;
            max-width: 5px;
            background-color: #fafafa;
            padding: 1px 0;
        }

        /* 参数列（与筛选列一致，进一步缩小） */
        .col-label {
            min-width: 4px;
            max-width: 5px;
            background-color: #e6f7ff;
            text-align: center;
            padding: 1px 0;
        }

        /* 数据列（列宽进一步缩小） */
        th:not(.col-filter):not(.col-label),
        td:not(.col-filter):not(.col-label) {
            min-width: 8px;
            max-width: 10px;
        }

        th:not(.col-filter):not(.col-label) {
            background-color: #e6f7ff;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2px;
            flex-wrap: nowrap;
        }

        th:not(.col-filter):not(.col-label):hover {
            background-color: #bae7ff;
        }

        .edit-icon {
            margin-left: 0;
            color: #1890ff;
            font-size: 10px;
            cursor: pointer;
        }

        .del-icon {
            margin-left: 0;
            color: #ff4d4f;
            font-size: 10px;
            cursor: pointer;
        }
        .del-icon:hover { color: #ff7875; }

        th:not(.col-filter):not(.col-label):hover .edit-icon {
            color: #1890ff;
        }

        /* 左侧筛选输入框 */
        .filter-input {
            width: 100%;
            padding: 1px 1px;
            border: 1px solid #d9d9d9;
            border-radius: 3px;
            font-size: 9px;
            outline: none;
            font-family: inherit;
            background: #fff;
        }

        .filter-input:focus {
            border-color: #1890ff;
            box-shadow: 0 0 0 2px rgba(24,144,255,0.1);
        }

        .row-label {
            font-weight: 500;
            color: #333;
        }

        td input.cell-input {
            width: 100%;
            border: none;
            outline: none;
            text-align: center;
            background: transparent;
            font-family: inherit;
            font-size: 10px;
            padding: 0;
        }

        td input.cell-input:focus {
            background-color: #fffbe6;
        }

        /* 编辑模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.45);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: white;
            border-radius: 8px;
            padding: 20px;
            width: 92%;
            max-width: 460px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .modal-header {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 14px;
            color: #333;
        }

        .modal-body textarea {
            width: 100%;
            min-height: 280px;
            padding: 10px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.6;
            resize: vertical;
        }

        /* 列编辑：锁定项只读展示区 */
        .locked-area {
            background: #f5f5f5;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            padding: 8px 10px;
            margin-bottom: 10px;
        }
        .locked-area .locked-title {
            font-size: 12px;
            color: #999;
            margin-bottom: 6px;
        }
        .locked-line {
            display: flex;
            gap: 8px;
            font-size: 13px;
            padding: 2px 0;
        }
        .locked-line .lk-label {
            width: 92px;
            flex-shrink: 0;
            color: #999;
            text-align: right;
        }
        .locked-line .lk-val {
            color: #666;
        }

        .modal-footer {
            margin-top: 14px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            padding: 6px 16px;
            border-radius: 4px;
            border: 1px solid #d9d9d9;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .btn-primary { background: #1890ff; color: white; border-color: #1890ff; }
        .btn-primary:hover { background: #40a9ff; }
        .btn-default:hover { color: #1890ff; border-color: #1890ff; }

        td.hidden-col, th.hidden-col { display: none; }

        /* 序列号：可点击，触发新增变更 */
        .seq-num {
            font-weight: 600;
            color: #1890ff;
            cursor: pointer;
            text-decoration: underline;
        }
        .seq-num:hover { color: #40a9ff; }

        /* GitHub 同步状态指示灯 */
        .sync-indicator {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: #f0f0f0;
            color: #888;
            white-space: nowrap;
        }
        .sync-indicator::before {
            content: '';
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #bbb;
        }
        .sync-indicator.sync-ing { background: #e6f7ff; color: #1890ff; }
        .sync-indicator.sync-ing::before { background: #1890ff; }
        .sync-indicator.sync-ok { background: #f6ffed; color: #52c41a; }
        .sync-indicator.sync-ok::before { background: #52c41a; }
        .sync-indicator.sync-err { background: #fff1f0; color: #ff4d4f; }
        .sync-indicator.sync-err::before { background: #ff4d4f; }

        /* 顶部提示 toast */
        .toast {
            position: fixed; left: 50%; top: 20px; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 8px 16px;
            border-radius: 6px; font-size: 13px; z-index: 9999;
            opacity: 0; transition: opacity .3s; pointer-events: none;
            max-width: 90%; text-align: center;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: rgba(24,144,24,0.92); }
        .toast.error { background: rgba(220,40,40,0.92); }
    </style>
</head>

    <script>
        // 表格数据定义
        const tableData = [
            { key: 'sequence', label: '序列', filterable: false, values: ['', ''] },
            { key: 'date', label: '建档日期', filterable: true, values: ['', '', ''] },
            { key: 'customer', label: '客户', filterable: true, values: ['', '', ''] },
            { key: 'projectNo', label: '项目号', filterable: true, values: ['', '', ''] },
            { key: 'projectName', label: '项目名称', filterable: true, values: ['', '', ''] },
            { key: 'engineer', label: '工程师', filterable: true, values: ['', '', ''] },
            { key: 'changeTime', label: '变更时间', filterable: true, values: ['', '', ''] },
            { key: 'condition', label: '工况', filterable: true, values: ['', '', ''] },
            { key: 'moduleLength', label: '模组总长', filterable: true, values: ['', '', ''] },
            { key: 'totalStroke', label: '总行程', filterable: true, values: ['', '', ''] },
            { key: 'orderModel', label: '模组下单型号', filterable: true, values: ['', '', ''] },
            { key: 'motorModel', label: '电机型号', filterable: true, values: ['', '', ''] },
            { key: 'moverCount', label: '动子个数', filterable: true, values: ['', '', ''] },
            { key: 'driverModel', label: '驱动器型号', filterable: true, values: ['', '', ''] },
            { key: 'driverPower', label: '驱动器功率', filterable: true, values: ['', '', ''] },
            { key: 'photoelectric', label: '光电', filterable: true, values: ['', '', ''] },
            { key: 'guideRail', label: '导轨', filterable: true, values: ['', '', ''] },
            { key: 'readHead', label: '读头', filterable: true, values: ['', '', ''] },
            { key: 'powerLine', label: '动力线', filterable: true, values: ['', '', ''] },
            { key: 'encoderLine', label: '编码器线', filterable: true, values: ['', '', ''] },
            { key: 'drawingSource', label: '图纸来源', filterable: true, values: ['', '', ''] },
            { key: 'brakeResistor', label: '刹车电阻', filterable: true, values: ['', '', ''] },
            { key: 'other', label: '其他', filterable: true, values: ['', '', ''] }
        ];

        let currentEditCol = null;
        let columnCount = 2;

        // 当前日期，格式 YY/MM/DD（如 26/01/01）
        function todayStr() {
            const d = new Date();
            const y = String(d.getFullYear()).slice(-2);
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}/${m}/${day}`;
        }

        // 当前时间，格式 YY/MM/DD HH点MM分（如 26/01/01 00点00分）
        function nowStr() {
            const d = new Date();
            const y = String(d.getFullYear()).slice(-2);
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            return `${y}/${m}/${day} ${hh}点${mm}分`;
        }

        // 初始化表格
        function initTable() {
            const headerRow = document.getElementById('headerRow');
            const tbody = document.getElementById('tableBody');
            headerRow.innerHTML = '';
            tbody.innerHTML = '';

            // 自动生成序列号：仅在全空时初始化（保留新增变更插入的同序列号）
            // 从右到左依次增加（最右列=1，最左列最大）
            const seqVals = tableData[0].values;
            if (!seqVals || seqVals.every(v => !v)) {
                tableData[0].values = [];
                for (let col = 0; col < columnCount; col++) {
                    tableData[0].values.push(String(columnCount - col));
                }
            }

            // 自动生成建档日期：新建（含新增列）时填充当前日期
            const dateRow = tableData.find(r => r.key === 'date');
            if (dateRow) {
                for (let col = 0; col < columnCount; col++) {
                    if (!dateRow.values[col]) dateRow.values[col] = todayStr();
                }
            }

            // 表头：筛选列 + 参数列 + 数据列（数据列表头留空，按钮移至表格首行单元格）
            const filterTh = document.createElement('th');
            filterTh.className = 'col-filter';
            filterTh.textContent = '筛选';
            headerRow.appendChild(filterTh);

            const labelTh = document.createElement('th');
            labelTh.className = 'col-label';
            labelTh.textContent = '参数';
            headerRow.appendChild(labelTh);

            for (let i = 0; i < columnCount; i++) {
                const th = document.createElement('th');
                th.dataset.col = i;
                headerRow.appendChild(th);
            }

            // 计算同序列号的连续分组（用于合并行 colspan）
            const groups = computeSeqGroups();

            // 首行：编辑/删除按钮 与「筛选」「参数」文本 在同一行
            const btnTr = document.createElement('tr');
            const btnFTd = document.createElement('td');
            btnFTd.className = 'col-filter';
            btnFTd.textContent = '筛选';
            btnTr.appendChild(btnFTd);
            const btnLTd = document.createElement('td');
            btnLTd.className = 'col-label';
            btnLTd.innerHTML = '<span class="row-label">参数</span>';
            btnTr.appendChild(btnLTd);
            for (let i = 0; i < columnCount; i++) {
                const btd = document.createElement('td');
                btd.dataset.col = i;
                btd.innerHTML =
                    `<span class="edit-icon" title="编辑列" onclick="editColumn(${i})">✎</span>` +
                    `<span class="del-icon" title="删除列" onclick="deleteColumn(${i})">✕</span>`;
                btnTr.appendChild(btd);
            }
            tbody.appendChild(btnTr);

            // 表体
            tableData.forEach((row, rowIndex) => {
                const tr = document.createElement('tr');
                tr.dataset.rowKey = row.key;

                // 筛选列（最左）
                const filterTd = document.createElement('td');
                filterTd.className = 'col-filter';
                if (row.filterable) {
                    filterTd.innerHTML = `<input class="filter-input" type="text" placeholder="筛选"
                        data-row-key="${row.key}" oninput="applyFilters()">`;
                }
                tr.appendChild(filterTd);

                // 参数列
                const labelTd = document.createElement('td');
                labelTd.className = 'col-label';
                labelTd.innerHTML = `<span class="row-label">${row.label}</span>`;
                tr.appendChild(labelTd);

                // 数据列
                for (let col = 0; col < columnCount; col++) {
                    const val = row.values[col] !== undefined ? row.values[col] : '';
                    if (isMergeRow(row.key)) {
                        // 合并行：同序列号相邻列合并为一个单元格
                        const g = groups[col];
                        if (g.start === col) {
                            const td = document.createElement('td');
                            td.dataset.col = g.start;
                            td.setAttribute('colspan', g.span);
                            if (row.key === 'sequence') {
                                td.innerHTML = `<span class="seq-num" onclick="openChangeModal(${g.start})" title="点击新增变更">${val}</span>`;
                            } else {
                                td.innerHTML = `<span style="font-weight:600;color:#333;">${val}</span>`;
                            }
                            tr.appendChild(td);
                        }
                        // 非组首列不渲染（被合并覆盖）
                    } else {
                        const td = document.createElement('td');
                        td.dataset.col = col;
                        td.innerHTML = `<input class="cell-input" type="text" value="${val}" onchange="updateValue(${rowIndex}, ${col}, this.value)">`;
                        tr.appendChild(td);
                    }
                }

                tbody.appendChild(tr);
            });
            saveStateToDom();
        }

        // 合并行：序列号、建档日期、客户、项目号、项目名称、工程师（同一序列号相邻列合并）
        function isMergeRow(key) {
            return ['sequence', 'date', 'customer', 'projectNo', 'projectName', 'engineer'].includes(key);
        }

        // 计算同序列号的连续分组（用于合并行 colspan）
        function computeSeqGroups() {
            const seqs = tableData[0].values;
            const groups = [];
            let col = 0;
            while (col < columnCount) {
                const seq = seqs[col];
                let span = 1;
                while (col + span < columnCount && seqs[col + span] === seq) span++;
                for (let k = 0; k < span; k++) {
                    groups[col + k] = { start: col, span: span };
                }
                col += span;
            }
            return groups;
        }

        // 新增变更：在目标列前插入同序列号列，公共行合并
        let changeTargetCol = null;
        function openChangeModal(col) {
            changeTargetCol = col;
            const seq = tableData[0].values[col];
            document.getElementById('changeModalText').textContent =
                `将在序列号「${seq}」的方案前新增一个变更列。客户、项目号、项目名称、工程师将自动合并，其余参数需重新填写。`;
            document.getElementById('changeModal').classList.add('show');
        }
        function closeChangeModal() {
            document.getElementById('changeModal').classList.remove('show');
            changeTargetCol = null;
        }
        function confirmChange() {
            if (changeTargetCol === null) return;
            insertChangeColumn(changeTargetCol);
            closeChangeModal();
        }
        function insertChangeColumn(beforeCol) {
            const srcSeq = tableData[0].values[beforeCol];
            tableData.forEach(row => {
                let newVal = '';
                if (row.key === 'sequence') {
                    newVal = srcSeq;                       // 同序列号
                } else if (row.key === 'changeTime') {
                    newVal = nowStr();                     // 变更时间：新增变更时为当前时间
                } else if (isMergeRow(row.key)) {
                    newVal = row.values[beforeCol] || '';  // 合并：复制公共信息（含建档日期）
                } else {
                    newVal = '';                           // 其余行不合并，留空待填
                }
                row.values.splice(beforeCol, 0, newVal);
            });
            columnCount++;
            initTable();
            triggerAutoSync();
        }

        // 实时筛选：根据各筛选框，隐藏不匹配的数据列（按方案组统一判定，兼容合并单元格）
        function applyFilters() {
            const inputs = document.querySelectorAll('.filter-input');
            const conditions = [];
            inputs.forEach(inp => {
                const v = inp.value.trim().toLowerCase();
                if (v) conditions.push({ rowKey: inp.dataset.rowKey, val: v });
            });

            // 计算每列是否显示
            const colShow = [];
            for (let col = 0; col < columnCount; col++) {
                let show = true;
                conditions.forEach(cond => {
                    const rowData = tableData.find(r => r.key === cond.rowKey);
                    const cellVal = (rowData.values[col] || '').toString().toLowerCase();
                    if (!cellVal.includes(cond.val)) show = false;
                });
                colShow[col] = show;
            }

            // 同一序列号为一组：组内任一列被隐藏则整组隐藏（方案整体进出）
            const seqs = tableData[0].values;
            let col = 0;
            while (col < columnCount) {
                const seq = seqs[col];
                let span = 1;
                while (col + span < columnCount && seqs[col + span] === seq) span++;
                let groupShow = true;
                for (let k = 0; k < span; k++) if (!colShow[col + k]) groupShow = false;
                for (let k = 0; k < span; k++) colShow[col + k] = groupShow;
                col += span;
            }

            // 应用：表头
            for (let c = 0; c < columnCount; c++) {
                document.querySelectorAll(`#dataTable thead th[data-col="${c}"]`).forEach(hc => {
                    hc.classList.toggle('hidden-col', !colShow[c]);
                });
                // 各数据行：按 data-col 定位
                document.querySelectorAll('#tableBody tr').forEach(tr => {
                    const td = tr.querySelector(`td[data-col="${c}"]`);
                    if (td) td.classList.toggle('hidden-col', !colShow[c]);
                });
            }
        }

        // 更新单元格值
        function updateValue(rowIdx, colIdx, value) {
            if (tableData[rowIdx]) tableData[rowIdx].values[colIdx] = value;
            saveStateToDom();
            triggerAutoSync();
        }

        // 列编辑中锁定的行（不可修改）：序列号、建档日期、客户
        const LOCKED_KEYS = ['sequence', 'date', 'customer'];

        // 编辑列
        function editColumn(colIndex) {
            currentEditCol = colIndex;
            const modal = document.getElementById('editModal');
            const lockedArea = document.getElementById('lockedRows');
            const textarea = document.getElementById('editTextarea');
            lockedArea.innerHTML = '';

            // 锁定项标题
            const title = document.createElement('div');
            title.className = 'locked-title';
            title.textContent = '以下为锁定项（自动生成，不可修改）：';
            lockedArea.appendChild(title);

            let content = '';
            tableData.forEach(row => {
                const val = row.values[colIndex] !== undefined ? row.values[colIndex] : '';
                if (LOCKED_KEYS.includes(row.key)) {
                    // 锁定项：只读显示，不能输入
                    const line = document.createElement('div');
                    line.className = 'locked-line';
                    const l = document.createElement('span');
                    l.className = 'lk-label';
                    l.textContent = row.label;
                    const v = document.createElement('span');
                    v.className = 'lk-val';
                    v.textContent = val;
                    line.appendChild(l);
                    line.appendChild(v);
                    lockedArea.appendChild(line);
                } else {
                    // 可编辑项：填入文本框（之前的款式）
                    content += row.label + ': ' + val + '\n';
                }
            });

            textarea.value = content.trim();
            modal.classList.add('show');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            currentEditCol = null;
        }

        function saveColumn() {
            if (currentEditCol === null) return;
            const textarea = document.getElementById('editTextarea');
            textarea.value.split('\n').forEach(line => {
                const m = line.match(/^(.+?):\s*(.*)$/);
                if (m) {
                    const rowData = tableData.find(r => r.label === m[1].trim());
                    // 锁定项跳过，保持原值不可改
                    if (rowData && !LOCKED_KEYS.includes(rowData.key)) {
                        rowData.values[currentEditCol] = m[2].trim();
                    }
                }
            });
            initTable();
            closeEditModal();
            triggerAutoSync();
        }

        function addColumn() {
            columnCount++;
            // 普通新增方案：插在标题列（参数列）右边，即最左数据列；分配新的唯一方案号（最大+1）
            const maxSeq = Math.max(0, ...tableData[0].values.map(v => parseInt(v) || 0));
            const newSeq = String(maxSeq + 1);
            tableData.forEach(row => {
                const newVal = row.key === 'sequence' ? newSeq : '';
                row.values.splice(0, 0, newVal);
            });
            initTable();
            triggerAutoSync();
        }

        // 删除列
        function deleteColumn(colIndex) {
            if (columnCount <= 1) {
                alert('至少保留一列，无法删除。');
                return;
            }
            if (!confirm('确定删除该列？此操作不可撤销。')) return;
            tableData.forEach(row => {
                if (row.values[colIndex] !== undefined) row.values.splice(colIndex, 1);
            });
            columnCount--;
            initTable();
            triggerAutoSync();
        }

        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditModal();
        });

        document.getElementById('changeModal').addEventListener('click', function(e) {
            if (e.target === this) closeChangeModal();
        });

        /* ============ GitHub 同步功能 ============ */

        // 将当前表格内存状态写入 #xm-state（随 HTML 一起被同步）
        function saveStateToDom() {
            const el = document.getElementById('xm-state');
            if (el) el.textContent = JSON.stringify({ tableData: tableData, columnCount: columnCount });
        }

        // 自动同步：开启后，编辑动作防抖静默推送到 GitHub（对齐参考实现的 autoSync）
        let autoSyncTimer = null;
        function triggerAutoSync() {
            const cfg = loadGhConfig();
            if (isAutoPulling) return;
            if (!cfg.autoSync) return;
            if (!cfg.token || !cfg.owner || !cfg.repo || !cfg.path) return;
            clearTimeout(autoSyncTimer);
            autoSyncTimer = setTimeout(() => pushToGithub(true), 1500);
        }

        // 从 #xm-state 还原表格状态（从 GitHub 下载后调用）
        function loadStateFromDom() {
            const el = document.getElementById('xm-state');
            if (el && el.textContent && el.textContent.trim()) {
                try {
                    const s = JSON.parse(el.textContent);
                    if (s.tableData && Array.isArray(s.tableData)) {
                        tableData.length = 0;
                        s.tableData.forEach(r => tableData.push(r));
                    }
                    if (typeof s.columnCount === 'number') columnCount = s.columnCount;
                } catch (e) { /* 状态损坏则使用默认数据 */ }
            }
            initTable();
        }

        // 顶部提示
        let toastTimer = null;
        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (type ? ' ' + type : '');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { t.className = 'toast'; }, 2600);
        }
        // GitHub 同步状态指示灯（灰=待同步 / 蓝=同步中 / 绿=成功 / 红=失败）
        function setGhStatus(msg, type) {
            const el = document.getElementById('syncIndicator');
            if (!el) return;
            el.textContent = msg || '';
            el.className = 'sync-indicator' + (type ? ' sync-' + type : '');
        }

        // 自动下载守卫：打开文件拉取期间，禁止触发自动上传
        let isAutoPulling = false;

        // 配置读写：默认参数已内嵌（自动同步开），可被本机 localStorage 覆盖
        const GH_KEY = 'xm_gh_config';
        const DEFAULT_GH_CONFIG = {
            token: '***GH_TOKEN***',
            owner: 'maidang0706',
            repo: 'opp3',
            branch: '',                       // 留空 = 使用仓库默认分支
            path: 'XM方案表-LT.html',
            commit: 'XM方案表 同步更新',
            autoSync: true
        };
        function loadGhConfig() {
            let stored = {};
            try { stored = JSON.parse(localStorage.getItem(GH_KEY)) || {}; } catch (e) { stored = {}; }
            return Object.assign({}, DEFAULT_GH_CONFIG, stored);
        }
        function saveGhConfig(cfg) {
            localStorage.setItem(GH_KEY, JSON.stringify(cfg));
        }

        // 取得要同步的完整 HTML（含最新状态）；推送前剥离真实 Token，避免泄露到仓库
        function getSyncContent() {
            saveStateToDom();
            let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
            if (DEFAULT_GH_CONFIG && DEFAULT_GH_CONFIG.token) {
                html = html.split(DEFAULT_GH_CONFIG.token).join('***GH_TOKEN***');
            }
            return html;
        }

        // 上传到 GitHub（新建或更新文件）；silent=true 时静默（自动同步用，不弹提示）
        async function pushToGithub(silent) {
            silent = silent || false;
            const cfg = loadGhConfig();
            if (!cfg.token || !cfg.owner || !cfg.repo || !cfg.path) {
                setGhStatus('配置缺失', 'err');
                if (!silent) showToast('同步配置缺失', 'error');
                return;
            }
            const apiPath = encodeURIComponent(cfg.path);
            const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${apiPath}`;
            const headers = { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github+json' };
            try {
                setGhStatus('同步中…', 'ing');
                // 先查是否已有文件（拿到 sha）
                let sha = null;
                const refQ = cfg.branch ? '?ref=' + encodeURIComponent(cfg.branch) : '';
                const getRes = await fetch(url + refQ, { headers });
                if (getRes.ok) {
                    const j = await getRes.json();
                    sha = j.sha || null;
                } else if (getRes.status !== 404) {
                    const err = await getRes.json().catch(() => ({}));
                    throw new Error(err.message || ('读取失败 ' + getRes.status));
                }
                const content = btoa(unescape(encodeURIComponent(getSyncContent())));
                const body = {
                    message: (cfg.commit || 'XM方案表 同步更新') + ' ' + new Date().toLocaleString(),
                    content: content
                };
                if (sha) body.sha = sha;
                if (cfg.branch) body.branch = cfg.branch;
                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: Object.assign({ 'Content-Type': 'application/json' }, headers),
                    body: JSON.stringify(body)
                });
                if (!putRes.ok) {
                    const err = await putRes.json().catch(() => ({}));
                    throw new Error(err.message || ('上传失败 ' + putRes.status));
                }
                setGhStatus('已同步', 'ok');
                if (!silent) showToast('上传成功', 'success');
            } catch (e) {
                setGhStatus('同步失败', 'err');
                showToast((silent ? '自动同步失败：' : '上传失败：') + e.message, 'error');
            }
        }

        // 从 GitHub 下载并还原
        async function pullFromGithub() {
            const cfg = loadGhConfig();
            if (!cfg.token || !cfg.owner || !cfg.repo || !cfg.path) {
                setGhStatus('配置缺失', 'err');
                return;
            }
            isAutoPulling = true;
            const apiPath = encodeURIComponent(cfg.path);
            const url = 'https://api.github.com/repos/' + cfg.owner + '/' + cfg.repo + '/contents/' + apiPath + (cfg.branch ? '?ref=' + encodeURIComponent(cfg.branch) : '');
            try {
                setGhStatus('下载中…', 'ing');
                const res = await fetch(url, {
                    headers: { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github+json' }
                });
                if (res.status === 404) { setGhStatus('云端暂无数据', ''); return; }
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.message || ('下载失败 ' + res.status));
                }
                const j = await res.json();
                const bin = atob(j.content.replace(/\s/g, ''));
                const html = decodeURIComponent(escape(bin));
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const stateEl = doc.getElementById('xm-state');
                if (!stateEl || !stateEl.textContent.trim()) throw new Error('文件中未找到状态数据');
                const s = JSON.parse(stateEl.textContent);
                if (!s.tableData || !Array.isArray(s.tableData)) throw new Error('状态数据格式不正确');
                tableData.length = 0;
                s.tableData.forEach(r => tableData.push(r));
                if (typeof s.columnCount === 'number') columnCount = s.columnCount;
                initTable();
                setGhStatus('已下载', 'ok');
            } catch (e) {
                setGhStatus('下载失败', 'err');
                showToast('下载失败：' + e.message, 'error');
            } finally {
                isAutoPulling = false;
            }
        }

        loadStateFromDom();
        // 打开文件自动从 GitHub 下载最新数据
        pullFromGithub();
    </script>


</body></html>
